<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hors connexion — CRPE Français</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Cormorant+Garamond:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Manrope', 'Avenir Next', 'Segoe UI', sans-serif;
      background-color: #F5F1E8;
      color: #2C2420;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .card {
      background: #FDF9F3;
      border: 1px solid #D8D2C6;
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(44, 36, 32, 0.06);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', 'Palatino Linotype', serif;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #2C2420;
    }

    p {
      color: #6B534A;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    button {
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      background-color: #4A6E8F;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #3A5A7A;
    }

    button:focus-visible {
      outline: 2px solid #4A6E8F;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Connexion requise</h1>
    <p>
      Tu sembles être hors connexion. Vérifie ta connexion internet
      et réessaie pour continuer tes révisions.
    </p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
